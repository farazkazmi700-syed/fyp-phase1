<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feedback — LLaMA 3 Chatbot</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body class="page-body">
  <div class="page-shell">
    <aside class="page-sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">⭐ Feedback</div>
      </div>
      <nav class="page-nav">
        <a class="menu-item" href="/chat">💬 Chat</a>
        <a class="menu-item" href="/analytics">📊 Analytics</a>
      </nav>
    </aside>

    <main class="page-main">
      <div class="page-title-group">
        <div class="logo-icon">⭐</div>
        <div>
          <h1>Feedback Page</h1>
          <p class="login-subtitle">Rate the assistant response and share your thoughts.</p>
        </div>
      </div>

      <div class="feedback-status page-alert" id="feedback-error"></div>

      <div class="feedback-panel" id="feedback-panel">
        <div class="feedback-header">
          <span>Rate this response</span>
        </div>

        <div class="feedback-row">
          <label>Rating:</label>
          <div class="star-rating" id="star-rating">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
          </div>
        </div>

        <div class="feedback-row">
          <label>Correctness:</label>
          <div class="btn-group" id="correctness-group">
            <button class="toggle-btn" data-value="correct">✅ Correct</button>
            <button class="toggle-btn" data-value="partially_correct">⚠️ Partial</button>
            <button class="toggle-btn" data-value="incorrect">❌ Wrong</button>
          </div>
        </div>

        <div class="feedback-row">
          <label>Length:</label>
          <div class="btn-group" id="length-group">
            <button class="toggle-btn" data-value="too_short">Too Short</button>
            <button class="toggle-btn" data-value="just_right">Just Right</button>
            <button class="toggle-btn" data-value="too_long">Too Long</button>
          </div>
        </div>

        <div class="feedback-row">
          <textarea id="feedback-comment" placeholder="Optional comment..." rows="3"></textarea>
        </div>

        <button class="btn-primary btn-submit-feedback" id="btn-submit-feedback">Submit Feedback</button>
        <div class="feedback-status" id="feedback-status"></div>
      </div>

      <div class="page-actions">
        <a href="/chat" class="btn-secondary">Back to Chat</a>
      </div>
    </main>
  </div>

  <script src="/static/js/feedback.js"></script>
</body>
</html>
